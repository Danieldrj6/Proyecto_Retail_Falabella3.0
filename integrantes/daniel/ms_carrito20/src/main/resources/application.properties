spring.application.name=ms_carrito20

#Conexion a Mysql
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/db_carrito?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Swagger APIs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
# Probar Swagger APIs:
# http://localhost:8080/doc/swagger-ui/index.html
# Cambiar esto: 
#		<dependency>
#				<artifactId>springdoc-openapi-starter-webmvc-ui</artifactId>
#			<version>2.6.0</version> -> 2.8.0 si no funciona el swagger entre microservicios
#		</dependency>

#Profile activo de FakerLoader
spring.profiles.active=false